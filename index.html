<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派信娱乐 - 引领游戏潮流</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kaiti', 'STKaiti', 'KaiTi', '楷体', sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 流星背景 */
        #meteor-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 圆圈层 */
        #circles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 70%);
            box-shadow: 
                0 0 10px rgba(255, 255, 255, 0.2),
                inset 0 0 10px rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(100px, -50px) rotate(90deg);
            }
            50% {
                transform: translate(50px, 100px) rotate(180deg);
            }
            75% {
                transform: translate(-50px, 50px) rotate(270deg);
            }
        }

        /* 内容容器 */
        .content-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1vh 0 5vh;
            gap: 1.5vh;
        }

        /* 标题样式 */
        .title-section {
            text-align: center;
            margin-bottom: 0.5vh;
        }

        .main-title {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            color: #aaa;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* 图片和按钮区域 */
        .images-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 450px;
            flex: 1;
            justify-content: flex-start;
        }

        .image-button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
        }

        .square-image {
            width: 50%;
            aspect-ratio: 1;
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .square-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .square-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        /* 响应式设计 - 移动端优化 */
        @media (max-width: 768px) {
            .content-container {
                padding: 1vh 0 3vh;
                gap: 1.5vh;
            }
            
            .main-title {
                font-size: clamp(2rem, 12vw, 4rem);
            }
            
            .subtitle {
                font-size: clamp(0.8rem, 3vw, 1.1rem);
                margin-top: 0.3rem;
            }
            
            .images-section {
                gap: 1rem;
                max-width: 350px;
            }
            
            .image-button-group {
                gap: 0.6rem;
            }
            
            .square-image {
                width: 45%;
            }
            
            .action-button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
                max-width: 140px;
            }
        }
        
        /* 按钮样式 */
        .action-button {
            padding: 0.5rem 1.2rem;
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 160px;
            backdrop-filter: blur(10px);
        }

        .action-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- 音效元素 -->
    <audio id="click-sound" preload="auto" volume="0.5">
        <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- 流星背景 -->
    <canvas id="meteor-background"></canvas>

    <!-- 圆圈层 -->
    <div id="circles-container">
        <div class="circle" style="width: 300px; height: 300px; top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 50%; right: 15%; animation-delay: -5s;"></div>
        <div class="circle" style="width: 250px; height: 250px; bottom: 20%; left: 20%; animation-delay: -10s;"></div>
    </div>

    <!-- 内容容器 -->
    <div class="content-container">
        <!-- 标题部分 -->
        <div class="title-section">
            <h1 class="main-title">派信娱乐</h1>
            <p class="subtitle" style="color: rgb(240, 237, 237); font-size: 14px;">引领派生态游戏潮流</p>
        </div>

        <!-- 图片和按钮部分 -->
        <div class="images-section">
            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p26-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/fa2bd1913da44bf0a67ea6f8fecf5745.jpg~tplv-a9rns2rl98-24:720:720.image?lk3s=8e244e95&amp;rcl=20260202165225597B414255485C4073A2&amp;rrcfp=8a172a1a&amp;x-expires=1770627146&amp;x-signature=%2B7agRGEGHYSNIY1daUFcUtUZHcM%3D" alt="派信娱乐官方宣传">
                </div>
                <button class="action-button" onclick="handleButtonClick(1)">官方介绍</button>
            </div>

            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/c16e8f85181442c883e333d11d633738.jpg~tplv-a9rns2rl98-24:720:720.image?lk3s=8e244e95&amp;rcl=20260202165349366A17818B208236B2E3&amp;rrcfp=8a172a1a&amp;x-expires=1770627229&amp;x-signature=QOjXcA98YIYjouIoh374sPRJ0eU%3D" alt="派信娱乐下载">
                </div>
                <button class="action-button" onclick="handleButtonClick(2)">股东查询器</button>
            </div>

            <div class="image-button-group">
                <div class="square-image">
                    <img src="https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/9f37f5db149c4abc909a67946844c16d.jpg~tplv-a9rns2rl98-24:720:720.image?lk3s=8e244e95&amp;rcl=20260202165508B4E979944AC4113659F3&amp;rrcfp=8a172a1a&amp;x-expires=1770627309&amp;x-signature=sD8yhMO7iK2BLFjCNr7kAe8cVBQ%3D" alt="派信娱乐预约">
                </div>
                <button class="action-button" onclick="handleButtonClick(3)">app模拟</button>
            </div>
        </div>
    </div>

    <script>
        // 流星背景动画
        const canvas = document.getElementById('meteor-background');
        const ctx = canvas.getContext('2d');

        // 设置canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 流星类
        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.length = Math.random() * 100 + 50;
                this.speed = Math.random() * 5 + 3;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.angle = Math.PI / 4 + (Math.random() * Math.PI / 6 - Math.PI / 12);
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if (this.y > canvas.height || this.x < -this.length || this.x > canvas.width + this.length) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = this.size;
                ctx.stroke();

                // 流星尾巴
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)');
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size * 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        // 创建流星
        const meteors = [];
        for (let i = 0; i < 20; i++) {
            meteors.push(new Meteor());
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();

        // 按钮点击处理
        function handleButtonClick(buttonId) {
            // 播放点击音效
            const clickSound = document.getElementById('click-sound');
            clickSound.currentTime = 0;
            clickSound.volume = 0.5; // 确保音量适中
            clickSound.play().then(() => {
                console.log('音效播放成功');
            }).catch(error => {
                console.log('无法播放音效:', error);
                // 如果自动播放被阻止，尝试用户交互后播放
                setTimeout(() => {
                    clickSound.play().catch(e => console.log('二次尝试播放失败:', e));
                }, 100);
            });
            
            const actions = {
                1: () => window.location.href = 'https://pixinyuleguangfang-51nw.vercel.app/',
                2: () => window.location.href = 'https://picinyulegudong.vercel.app/',
                3: () => window.location.href = 'https://pixinyule-iuns.vercel.app/'
            };
            
            if (actions[buttonId]) {
                actions[buttonId]();
            }
        }

        // 初始化Lucide图标
        lucide.createIcons();

        // 页面加载后自动刷新一次（仅在首次访问时）
        if (!localStorage.getItem('pageRefreshed')) {
            setTimeout(() => {
                localStorage.setItem('pageRefreshed', 'true');
                window.location.reload();
            }, 1000); // 1秒后刷新
        }
    </script>
</body>
</html>
